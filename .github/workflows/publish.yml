name: Validate Build on Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build and verify
        run: mvn --batch-mode verify -DskipTests

      - name: Summary
        run: |
          echo "✅ Tag ${{ github.ref_name }} is ready."
          echo "JitPack will build and serve this version automatically on first request."
          echo "Dependency to use:"
          echo "  <groupId>com.github.itways-ai</groupId>"
          echo "  <artifactId>common-lib</artifactId>"
          echo "  <version>${{ github.ref_name }}</version>"
